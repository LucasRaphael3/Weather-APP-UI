<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A beautiful weather app with live OpenWeatherMap data." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600;700&display=swap" rel="stylesheet">
    <title>Weather App</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="loading-overlay" class="loading-overlay" style="display:none;">
      <div class="loading-spinner"></div>
      <p class="loading-text">Fetching weather…</p>
    </div>
    <div id="error-toast" class="error-toast"></div>
    <div class="app-shell">
      <div class="aurora aurora-1"></div>
      <div class="aurora aurora-2"></div>
      <div class="aurora aurora-3"></div>
      <div class="screen active" id="screen-home">
        <div class="scroll-content">
          <header class="location-header">
            <div class="location-row">
              <span class="location-icon">📍</span>
              <h1 class="city-name" id="city-name">—</h1>
            </div>
            <p class="current-time" id="current-time">Loading…</p>
            <div class="temp-display" id="temp-display">—°</div>
            <p class="condition-label" id="condition-label">…</p>
            <p class="high-low" id="high-low">H:—°  L:—°</p>
          </header>
          <section class="hero-section" aria-label="Current weather illustration">
            <div class="hero-svg-wrapper">
            </div>
          </section>
          <section class="forecast-card glass-panel" aria-label="Forecast">
            <div class="tabs" role="tablist">
              <button class="tab active" id="tab-hourly" role="tab" aria-selected="true" aria-controls="panel-hourly">Hourly Forecast</button>
              <button class="tab" id="tab-weekly" role="tab" aria-selected="false" aria-controls="panel-weekly">Weekly Forecast</button>
            </div>
            <div class="tab-panel active" id="panel-hourly" role="tabpanel">
              <div class="hourly-list" id="hourly-list">
                <div class="skeleton-row">
                  <div class="h-capsule skeleton-pill"></div>
                  <div class="h-capsule skeleton-pill"></div>
                  <div class="h-capsule skeleton-pill"></div>
                  <div class="h-capsule skeleton-pill"></div>
                </div>
              </div>
            </div>
            <div class="tab-panel" id="panel-weekly" role="tabpanel">
              <div class="weekly-list" id="weekly-list"></div>
            </div>
          </section>
          <section class="details-card glass-panel" aria-label="Weather details">
            <div class="section-label">Air Quality</div>
            <div class="air-quality-card glass-inner">
              <div class="aq-header">
                <span class="aq-index" id="aq-index-text">—</span>
                <span class="aq-badge" id="aq-badge-text">—</span>
              </div>
              <div class="aq-slider-track">
                <div class="aq-slider-fill"></div>
                <div class="aq-slider-thumb" id="aq-thumb" style="left:10%"></div>
              </div>
              <div class="aq-labels">
                <span>Good</span><span>Fair</span><span>Mod.</span><span>Poor</span><span>V.Poor</span>
              </div>
            </div>
            <div class="section-label" style="margin-top:20px;">Weather Details</div>
            <div class="info-grid" id="info-grid"></div>
          </section>
        </div>
      </div>
      <div class="screen" id="screen-list">
        <div class="scroll-content">
          <header class="list-header">
            <h2 class="list-title">Weather</h2>
            <div class="search-box glass-panel">
              <span class="search-icon">🔍</span>
              <input type="text" id="city-search" placeholder="Search for a city…" aria-label="Search for a city"/>
            </div>
          </header>
          <div class="city-list" id="city-list">
          </div>
        </div>
      </div>
      <nav class="bottom-nav" aria-label="Main navigation">
        <button class="nav-btn active" id="nav-home" aria-label="Home">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
            <path d="M9 21V12h6v9"/>
          </svg>
          <span>Home</span>
        </button>
        <button class="fab-btn" id="nav-fab" aria-label="Add location">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="28" height="28">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
        <button class="nav-btn" id="nav-list" aria-label="City list">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
            <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
          </svg>
          <span>List</span>
        </button>
      </nav>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
